<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./tracker.css">
</head>

<body>

  <div class="header">
    <p class="m-0">Expense<br>Tracker <img src="./assets/spending.png" alt="" width="35px"> </p>

  </div>

  <div class="input-form">

    <div class="form-floating inputs">
      <input type="date" class="form-control dateInput" id="floatingInput" placeholder="name@example.com" required>
      <label for="floatingInput">Date<label>
    </div>


    <div class="form-floating inputs">
      <input type="email" class="form-control amountInput" id="floatingInput" placeholder="name@example.com" required>
      <label for="floatingInput">Amount<label>
    </div>

    <select class="form-select inputs transactionType" aria-label="Default select example" required>
      <option selected>Transaction Type</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <button class="btn" id="add-button" onclick="addRow();">+</button>

  </div>

  <div class="cards mt-4">


    <div class="card">
      <div class="card-body">
        <h5 class="card-title m-0">Total Income <img src="./assets/wallet-filled-money-tool.png" alt="" width="35px"
            height="35px">
        </h5>

        <h1 class="m-0">
          <img src="./assets/currency (2).png" alt="" height="40px" width="40px">
          <span id="totalIncome" class="m-0">0</span>
        </h1>

      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title m-0">Total Expenses <img src="./assets/expenses.png" alt="" width="40px" height="40px">
        </h5>

        <h1 class="m-0">
          <img src="./assets/currency (2).png" alt="" width="40px" height="40px">
          <span id="expense" class="m-0">0</span>
        </h1>

      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title m-0">Balance
          <img src="./assets/rupee.png" alt="" width="35px" height="35px">
        </h5>

        <h1 class="m-0">
          <img src="./assets/currency (2).png" alt="" width="35px">
          <span id="balance" class="m-0">0</span>
        </h1>

      </div>
    </div>

  </div>

  <table class="transaction-table mt-3" id="table">
    <tr id="header-row">
      <th>Amount</th>
      <th>Transaction Type</th>
      <th>Transaction Date</th>
      <th>Action</th>
    </tr>
    <!-- <tr>
        <td>10,499</td>
        <td>Income</td>
        <td>01-01-2024</td>
        <td>
          <button class="btn btn-sm delete-button"><img src="./assets/recycle-bin.png" width="35px"></button>
        </td>
      </tr> -->
  </table>

  <script>
    let table = document.getElementById('table');
    console.log(table);


    function deleteRow(row) {
      console.log(row);
      row.remove();
    }

    function addRow() {

      let date = document.getElementsByClassName('dateInput')[0].value;
      let amount = document.getElementsByClassName('amountInput')[0].value;
      let transactionType = document.getElementsByClassName('transactionType')[0].value;

      let row = document.createElement('tr');

      let amountCell = document.createElement('td');
      amountCell.innerText = amount;

      let transactionTypeCell = document.createElement('td');
      transactionTypeCell.innerText = transactionType;

      let transactionDateCell = document.createElement('td');
      transactionDateCell.innerText = date;



      console.log(amountCell, transactionTypeCell, transactionDateCell);

      let binCell = document.createElement("td");
      let delBtn = document.createElement("button");
      let binImg = document.createElement('img');
      binImg.src = "./assets/recycle-bin.png";
      binImg.style.width = "35px";
      binImg.style.height = "35px";
      delBtn.appendChild(binImg);
      delBtn.classList.add('delete-button');
      delBtn.onclick = () => deleteRow(row);
      binCell.appendChild(delBtn);



      if (transactionDateCell != "" && amountCell != "" && transactionTypeCell != "") {

        row.appendChild(amountCell);
        row.appendChild(transactionTypeCell);
        row.appendChild(transactionDateCell);
        row.appendChild(delBtn);

        table.appendChild(row);

        let totalIncome = document.getElementById('totalIncome').innerText;
        let totalExpense = document.getElementById('expense').innerText;
        let totalBalance = document.getElementById('balance').innerText;

        if (transactionType == 'income') {
          if (totalIncome == '0') {
            document.getElementById('totalIncome').innerText = amount;
          } else {
            document.getElementById('totalIncome').innerText = parseInt(totalIncome) + parseInt(amount);
          }
          if (totalBalance == '0') {
            document.getElementById('balance').innerText = amount;
          } else {
            document.getElementById('balance').innerText = parseInt(totalBalance) + parseInt(amount);
          }

        } else if (transactionType == 'expense') {
          if (totalExpense == '0') {
            document.getElementById('expense').innerText = amount;
          } else {
            document.getElementById('expense').innerText = parseInt(totalExpense) - parseInt(amount);
          }

          if (totalBalance == '0') {
            document.getElementById('balance').innerText = amount;
          } else {
            document.getElementById('balance').innerText = parseInt(totalBalance) - parseInt(amount);
          }
        }

        console.log(totalBalance, totalExpense, totalIncome);
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous">
  </script>
</body>

</html>
